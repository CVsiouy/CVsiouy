<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 180" width="900" height="180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="40%" style="stop-color:#1a0a2e"/>
      <stop offset="70%" style="stop-color:#0f3460"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D4FF"/>
      <stop offset="50%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#10B981"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#00D4FF" stroke-width="0.3" opacity="0.15"/>
    </pattern>
  </defs>

  <rect width="900" height="180" fill="url(#bg)"/>
  <rect width="900" height="180" fill="url(#grid)"/>

  <!-- Animated scan line -->
  <rect x="0" y="0" width="900" height="2" fill="#00D4FF" opacity="0.4">
    <animate attributeName="y" values="0;180;0" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Candlestick decorations -->
  <g opacity="0.6">
    <line x1="60" y1="120" x2="60" y2="70" stroke="#10B981" stroke-width="2"/>
    <rect x="52" y="85" width="16" height="25" fill="#10B981" rx="1">
      <animate attributeName="height" values="25;35;25" dur="2s" repeatCount="indefinite"/>
    </rect>
    <line x1="820" y1="130" x2="820" y2="60" stroke="#EF4444" stroke-width="2"/>
    <rect x="812" y="75" width="16" height="30" fill="#EF4444" rx="1">
      <animate attributeName="height" values="30;20;30" dur="2.5s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Main title -->
  <text x="450" y="75" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="42" font-weight="700" fill="url(#accent)" filter="url(#glow)">
    Chirag Verma
  </text>
  <text x="450" y="110" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="16" fill="#94a3b8" letter-spacing="3">
    SOFTWARE ENGINEER  ·  QUANT TRADER  ·  AI DEVELOPER  ·  .NET  ·  AZURE
  </text>

  <!-- Pulse dots -->
  <circle cx="200" cy="140" r="4" fill="#00D4FF">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="140" r="4" fill="#7C3AED">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="700" cy="140" r="4" fill="#10B981">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.5s" begin="0.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Bottom accent line -->
  <rect x="250" y="155" width="400" height="2" fill="url(#accent)" rx="1" opacity="0.8"/>
</svg>
