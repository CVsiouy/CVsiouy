<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 220" width="360" height="220">
  <rect width="360" height="220" fill="#0d1117" rx="8" stroke="#30363d"/>

  <text x="180" y="22" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="12" fill="#00D4FF" font-weight="600">TRADING SKILL MATRIX</text>

  <!-- Skill bars helper -->
  <g font-family="Segoe UI,sans-serif" font-size="10" fill="#94a3b8">
    <!-- Swing Trading 90% -->
    <text x="15" y="45">Swing Trading</text>
    <rect x="15" y="50" width="330" height="8" fill="#161b22" rx="4"/>
    <rect x="15" y="50" width="297" height="8" fill="#00D4FF" rx="4"><animate attributeName="width" values="0;297" dur="1.5s" fill="freeze"/></rect>

    <!-- Price Action 95% -->
    <text x="15" y="75">Price Action</text>
    <rect x="15" y="80" width="330" height="8" fill="#161b22" rx="4"/>
    <rect x="15" y="80" width="313" height="8" fill="#7C3AED" rx="4"><animate attributeName="width" values="0;313" dur="1.5s" begin="0.1s" fill="freeze"/></rect>

    <!-- Quant 75% -->
    <text x="15" y="105">Quant / Backtesting</text>
    <rect x="15" y="110" width="330" height="8" fill="#161b22" rx="4"/>
    <rect x="15" y="110" width="248" height="8" fill="#10B981" rx="4"><animate attributeName="width" values="0;248" dur="1.5s" begin="0.2s" fill="freeze"/></rect>

    <!-- Risk Mgmt 92% -->
    <text x="15" y="135">Risk Management</text>
    <rect x="15" y="140" width="330" height="8" fill="#161b22" rx="4"/>
    <rect x="15" y="140" width="304" height="8" fill="#F59E0B" rx="4"><animate attributeName="width" values="0;304" dur="1.5s" begin="0.3s" fill="freeze"/></rect>

    <!-- Python 88% -->
    <text x="15" y="165">Python (Trading)</text>
    <rect x="15" y="170" width="330" height="8" fill="#161b22" rx="4"/>
    <rect x="15" y="170" width="290" height="8" fill="#3776AB" rx="4"><animate attributeName="width" values="0;290" dur="1.5s" begin="0.4s" fill="freeze"/></rect>

    <!-- C# 90% -->
    <text x="15" y="195">C# (Systems)</text>
    <rect x="15" y="200" width="330" height="8" fill="#161b22" rx="4"/>
    <rect x="15" y="200" width="297" height="8" fill="#512BD4" rx="4"><animate attributeName="width" values="0;297" dur="1.5s" begin="0.5s" fill="freeze"/></rect>
  </g>
</svg>
