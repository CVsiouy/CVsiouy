      <rect x="145" y="25" width="40" height="16" fill="#EF4444" rx="2" opacity="0.85"><animate attributeName="opacity" values="0.7;1;0.7" dur="1.8s" begin="0.2s" repeatCount="indefinite"/></rect>
      <rect x="190" y="25" width="40" height="16" fill="#991B1B" rx="2" opacity="0.6"/>
