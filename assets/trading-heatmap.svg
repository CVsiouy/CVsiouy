      <rect x="280" y="25" width="40" height="16" fill="#EF4444" rx="2" opacity="0.75"><animate attributeName="opacity" values="0.5;0.9;0.5" dur="2.4s" begin="0.4s" repeatCount="indefinite"/></rect>
      <rect x="325" y="25" width="40" height="16" fill="#DC2626" rx="2" opacity="0.7"/>
      <rect x="370" y="25" width="40" height="16" fill="#10B981" rx="2" opacity="0.85"/>
      <rect x="415" y="25" width="40" height="16" fill="#EF4444" rx="2" opacity="0.8"><animate attributeName="opacity" values="0.6;1;0.6" dur="2.1s" begin="0.1s" repeatCount="indefinite"/></rect>
      <rect x="460" y="25" width="40" height="16" fill="#991B1B" rx="2" opacity="0.55"/>
      <rect x="505" y="25" width="40" height="16" fill="#10B981" rx="2" opacity="0.78"/>
      <rect x="550" y="25" width="40" height="16" fill="#EF4444" rx="2" opacity="0.82"/>
      <rect x="595" y="25" width="40" height="16" fill="#DC2626" rx="2" opacity="0.68"><animate attributeName="opacity" values="0.5;0.85;0.5" dur="2.3s" begin="0.5s" repeatCount="indefinite"/></rect>
      <rect x="640" y="25" width="40" height="16" fill="#10B981" rx="2" opacity="0.8"/>
      <rect x="685" y="25" width="40" height="16" fill="#EF4444" rx="2" opacity="0.75"/>
      <rect x="730" y="25" width="40" height="16" fill="#991B1B" rx="2" opacity="0.6"/>
