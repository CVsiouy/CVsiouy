      <rect x="505" y="45" width="40" height="16" fill="#059669" rx="2" opacity="0.8"/>
      <rect x="550" y="45" width="40" height="16" fill="#10B981" rx="2" opacity="0.9"><animate attributeName="opacity" values="0.7;1;0.7" dur="2s" begin="0.1s" repeatCount="indefinite"/></rect>
