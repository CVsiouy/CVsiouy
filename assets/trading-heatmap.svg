      <rect x="730" y="45" width="40" height="16" fill="#10B981" rx="2" opacity="0.87"/>
      <rect x="775" y="45" width="40" height="16" fill="#059669" rx="2" opacity="0.8"/>

      <!-- AUTO row - mixed red/green -->
      <rect x="10" y="65" width="40" height="16" fill="#EF4444" rx="2" opacity="0.75"/>
      <rect x="55" y="65" width="40" height="16" fill="#10B981" rx="2" opacity="0.8"><animate attributeName="opacity" values="0.6;0.95;0.6" dur="2.1s" begin="0.3s" repeatCount="indefinite"/></rect>
      <rect x="100" y="65" width="40" height="16" fill="#EF4444" rx="2" opacity="0.7"/>
      <rect x="145" y="65" width="40" height="16" fill="#10B981" rx="2" opacity="0.85"/>
      <rect x="190" y="65" width="40" height="16" fill="#DC2626" rx="2" opacity="0.65"><animate attributeName="opacity" values="0.5;0.85;0.5" dur="2.4s" begin="0.2s" repeatCount="indefinite"/></rect>
      <rect x="235" y="65" width="40" height="16" fill="#10B981" rx="2" opacity="0.78"/>
      <rect x="280" y="65" width="40" height="16" fill="#EF4444" rx="2" opacity="0.72"/>
      <rect x="325" y="65" width="40" height="16" fill="#10B981" rx="2" opacity="0.88"><animate attributeName="opacity" values="0.7;1;0.7" dur="1.8s" begin="0.5s" repeatCount="indefinite"/></rect>
      <rect x="370" y="65" width="40" height="16" fill="#991B1B" rx="2" opacity="0.55"/>
      <rect x="415" y="65" width="40" height="16" fill="#10B981" rx="2" opacity="0.82"/>
      <rect x="460" y="65" width="40" height="16" fill="#EF4444" rx="2" opacity="0.7"/>
      <rect x="505" y="65" width="40" height="16" fill="#10B981" rx="2" opacity="0.85"><animate attributeName="opacity" values="0.65;0.95;0.65" dur="2.2s" begin="0.1s" repeatCount="indefinite"/></rect>
      <rect x="550" y="65" width="40" height="16" fill="#DC2626" rx="2" opacity="0.68"/>
      <rect x="595" y="65" width="40" height="16" fill="#10B981" rx="2" opacity="0.8"/>
      <rect x="640" y="65" width="40" height="16" fill="#EF4444" rx="2" opacity="0.75"/>
      <rect x="685" y="65" width="40" height="16" fill="#10B981" rx="2" opacity="0.9"><animate attributeName="opacity" values="0.7;1;0.7" dur="2s" begin="0.4s" repeatCount="indefinite"/></rect>
      <rect x="730" y="65" width="40" height="16" fill="#059669" rx="2" opacity="0.78"/>
      <rect x="775" y="65" width="40" height="16" fill="#10B981" rx="2" opacity="0.85"/>
