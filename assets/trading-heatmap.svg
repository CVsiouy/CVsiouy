  </g>

  <!-- Legend -->
  <g transform="translate(720, 95)">
    <rect x="0" y="0" width="12" height="12" fill="#10B981" rx="2"/>
    <text x="18" y="10" font-size="9" fill="#64748b">Bullish</text>
    <rect x="70" y="0" width="12" height="12" fill="#EF4444" rx="2"/>
    <text x="88" y="10" font-size="9" fill="#64748b">Bearish</text>
  </g>
</svg>
