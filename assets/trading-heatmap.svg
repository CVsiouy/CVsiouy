<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 120" width="900" height="120">
  <rect width="900" height="120" fill="#0d1117" rx="6" stroke="#30363d"/>

  <text x="20" y="25" font-family="Segoe UI,sans-serif" font-size="13" fill="#00D4FF" font-weight="600">SECTOR HEATMAP</text>

  <!-- Heatmap grid: 18 cols x 4 rows -->
  <g transform="translate(20, 35)">
    <!-- Row labels -->
    <text x="-5" y="15" text-anchor="end" font-size="9" fill="#64748b">IT</text>
    <text x="-5" y="35" text-anchor="end" font-size="9" fill="#64748b">BANK</text>
    <text x="-5" y="55" text-anchor="end" font-size="9" fill="#64748b">PHARMA</text>
    <text x="-5" y="75" text-anchor="end" font-size="9" fill="#64748b">AUTO</text>

    <!-- Animated cells -->
    <g id="cells">
      <!-- IT row - mostly green -->
      <rect x="10" y="5" width="40" height="16" fill="#10B981" rx="2" opacity="0.9"><animate attributeName="opacity" values="0.7;1;0.7" dur="2s" begin="0s" repeatCount="indefinite"/></rect>
      <rect x="55" y="5" width="40" height="16" fill="#059669" rx="2" opacity="0.8"><animate attributeName="opacity" values="0.6;1;0.6" dur="2.2s" begin="0.2s" repeatCount="indefinite"/></rect>
      <rect x="100" y="5" width="40" height="16" fill="#10B981" rx="2" opacity="0.9"><animate attributeName="opacity" values="0.8;1;0.8" dur="1.8s" begin="0.4s" repeatCount="indefinite"/></rect>
      <rect x="145" y="5" width="40" height="16" fill="#34D399" rx="2" opacity="0.7"><animate attributeName="opacity" values="0.5;0.9;0.5" dur="2.5s" begin="0.1s" repeatCount="indefinite"/></rect>
      <rect x="190" y="5" width="40" height="16" fill="#065F46" rx="2" opacity="0.6"/>
      <rect x="235" y="5" width="40" height="16" fill="#10B981" rx="2" opacity="0.85"><animate attributeName="opacity" values="0.7;1;0.7" dur="2.1s" begin="0.3s" repeatCount="indefinite"/></rect>
      <rect x="280" y="5" width="40" height="16" fill="#059669" rx="2" opacity="0.75"/>
      <rect x="325" y="5" width="40" height="16" fill="#10B981" rx="2" opacity="0.9"><animate attributeName="opacity" values="0.6;1;0.6" dur="1.9s" begin="0.5s" repeatCount="indefinite"/></rect>
      <rect x="370" y="5" width="40" height="16" fill="#34D399" rx="2" opacity="0.8"/>
      <rect x="415" y="5" width="40" height="16" fill="#10B981" rx="2" opacity="0.85"><animate attributeName="opacity" values="0.7;1;0.7" dur="2.3s" begin="0.2s" repeatCount="indefinite"/></rect>
      <rect x="460" y="5" width="40" height="16" fill="#065F46" rx="2" opacity="0.5"/>
      <rect x="505" y="5" width="40" height="16" fill="#10B981" rx="2" opacity="0.9"/>
      <rect x="550" y="5" width="40" height="16" fill="#059669" rx="2" opacity="0.8"><animate attributeName="opacity" values="0.6;1;0.6" dur="2s" begin="0.4s" repeatCount="indefinite"/></rect>
      <rect x="595" y="5" width="40" height="16" fill="#10B981" rx="2" opacity="0.75"/>
      <rect x="640" y="5" width="40" height="16" fill="#34D399" rx="2" opacity="0.85"/>
