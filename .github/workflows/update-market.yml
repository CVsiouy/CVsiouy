name: Live Market Pulse Auto-Update

on:
  schedule:
    # Run every 30 minutes during market and trading hours (approx. 3:00 to 18:00 UTC)
    - cron: "*/30 3-18 * * *"
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  update-pulse:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Fetch Live Data & Update SVGs
        run: python scripts/update_market.py

      - name: Commit & Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/*.svg
          if git diff --staged --quiet; then
            echo "No changes in SVGs. Skipping commit."
          else
            git commit -m "chore: auto-update Live Market Pulse SVGs [skip ci]"
            git push
          fi
